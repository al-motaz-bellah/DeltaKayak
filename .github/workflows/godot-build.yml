name: Godot Build
on: [push]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        uses: godotengine/godot-setup@v1
        with:
          version: 4.2.1
          include-templates: true

      - name: Export Project
        run: |
          mkdir -p build/
          # تصدير اللعبة - سأقوم هنا باستخدام اسم افتراضي شائع
          # إذا فشل، سأعطيك الطريقة لتعديل هذا الاسم
          godot --headless --export-release "Windows Desktop" ./build/game.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: ./build/

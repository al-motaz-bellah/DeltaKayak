name: Robust Build
on: [push]

jobs:
  build-and-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug - List Files
        run: |
          echo "محتويات المشروع الحالية:"
          find . -maxdepth 2 -not -path '*/.*'

      - name: Install Godot
        uses: godotengine/godot-setup@v1
        with:
          version: 4.2.1
          include-templates: true

      - name: Export Project
        run: |
          mkdir -p build/
          # محاولة التصدير باسم افتراضي، وسنرى النتيجة في الـ Logs
          godot --headless --export-release "Windows Desktop" ./build/game.exe || \
          godot --headless --export-release "Win" ./build/game.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: ./build/

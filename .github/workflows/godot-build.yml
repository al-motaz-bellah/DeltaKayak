name: Ultimate Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Godot
        uses: godotengine/godot-setup@v1
        with:
          version: 4.2.1

      - name: Export Project
        run: |
          # استخراج اسم الـ Preset الأول من ملف الإعدادات
          PRESET_NAME=$(grep -oP '(?<=\[preset\.)[^\]]+' export_presets.cfg | head -n 1)
          # إذا فشل الاستخراج، نستخدم افتراضياً Windows Desktop
          NAME=${PRESET_NAME:-"Windows Desktop"}
          
          echo "جاري التصدير باستخدام الـ Preset: $NAME"
          mkdir -p build/
          godot --headless --export-release "$NAME" ./build/game.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: ./build/

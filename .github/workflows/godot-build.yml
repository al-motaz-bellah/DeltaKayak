
     name: Simple Build
on: [push]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Export
        run: |
          # 1. تحميل المحرك برابط مباشر ومضمون
          wget https://github.com/godotengine/godot/releases/download/4.2.1-stable/Godot_v4.2.1-stable_linux.x86_64.zip
          unzip Godot_v4.2.1-stable_linux.x86_64.zip
          mv Godot_v4.2.1-stable_linux.x86_64 godot_executable
          
          # 2. إنشاء مجلد للمخرجات
          mkdir -p build/
          
          # 3. أمر التصدير المباشر
          ./godot_executable --headless --export-release "Windows Desktop" build/game.exe
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: build/
